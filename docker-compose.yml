services:
  web:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    working_dir: /app/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./database:/app/database

  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info
    working_dir: /app/backend
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./database:/app/database

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"